          source: "import Together from \"together-ai\";\nconst client = new Together();\n\nconst secret = await client.beta.jig.secrets.retrieve(\"my-secret\");\nconsole.log(secret);\n"
        - lang: JavaScript
          label: Together AI SDK (JavaScript)
          source: "import Together from \"together-ai\";\nconst client = new Together();\n\nconst secret = await client.beta.jig.secrets.retrieve(\"my-secret\");\nconsole.log(secret);\n"
        - lang: Shell
