          source: "import Together from \"together-ai\";\n\nconst client = new Together({\n  apiKey: process.env.TOGETHER_API_KEY,\n});\n\nconst response = await client.audio.voices.list()\n\nconsole.log(response.data);\n"
components:
  schemas:
    AudioFileBinary:
      type: string
      description: Audio file to transcribe
      format: binary
    AudioFileUrl:
      type: string
      description: Public HTTPS URL to audio file
      format: uri
    AudioSpeechRequest:
      required:
        - model
        - input
        - voice
      type: object
      properties:
        input:
          type: string
          description: Input text to generate the audio for
        language:
          enum:
            - en
            - de
            - fr
            - es
            - hi
            - it
            - ja
            - ko
            - nl
            - pl
            - pt
            - ru
            - sv
            - tr
            - zh
          type: string
          description: Language of input text.
          default: en
        model:
          anyOf:
            - enum:
                - cartesia/sonic
                - hexgrad/Kokoro-82M
                - canopylabs/orpheus-3b-0.1-ft
              type: string
            - type: string
          description: "The name of the model to query.<br> <br> [See all of Together AI's chat models](https://docs.together.ai/docs/serverless-models#audio-models) The current supported tts models are: - cartesia/sonic - hexgrad/Kokoro-82M - canopylabs/orpheus-3b-0.1-ft\n"
          example: canopylabs/orpheus-3b-0.1-ft
        response_encoding:
          enum:
            - pcm_f32le
            - pcm_s16le
            - pcm_mulaw
            - pcm_alaw
          type: string
          description: Audio encoding of response
          default: pcm_f32le
        response_format:
          enum:
            - mp3
            - wav
            - raw
          type: string
          description: 'The format of audio output. Supported formats are mp3, wav, raw if streaming is false. If streaming is true, the only supported format is raw.'
          default: wav
        sample_rate:
          type: integer
          description: Sampling rate to use for the output audio. The default sampling rate for canopylabs/orpheus-3b-0.1-ft and hexgrad/Kokoro-82M is 24000 and for cartesia/sonic is 44100.
          default: 44100
        stream:
          type: boolean
          description: 'If true, output is streamed for several characters at a time instead of waiting for the full response. The stream terminates with `data: [DONE]`. If false, return the encoded audio as octet stream'
          default: false
        voice:
          type: string
          description: "The voice to use for generating the audio. The voices supported are different for each model. For eg - for canopylabs/orpheus-3b-0.1-ft, one of the voices supported is tara, for hexgrad/Kokoro-82M, one of the voices supported is af_alloy and for cartesia/sonic, one of the voices supported is \"friendly sidekick\". <br> <br> You can view the voices supported for each model using the /v1/voices endpoint sending the model name as the query parameter. [View all supported voices here](https://docs.together.ai/docs/text-to-speech#voices-available).\n"
    AudioSpeechStreamChunk:
      required:
        - object
        - model
        - b64
      type: object
      properties:
        b64:
          type: string
          description: base64 encoded audio stream
        model:
          type: string
          example: cartesia/sonic
        object:
          enum:
            - audio.tts.chunk
          description: 'The object type, which is always `audio.tts.chunk`.'
    AudioSpeechStreamEvent:
      required:
        - data
      type: object
      properties:
        data:
          $ref: '#/components/schemas/AudioSpeechStreamChunk'
    AudioSpeechStreamResponse:
      oneOf:
        - $ref: '#/components/schemas/AudioSpeechStreamEvent'
        - $ref: '#/components/schemas/StreamSentinel'
    AudioTranscriptionJsonResponse:
      required:
        - text
      type: object
      properties:
        text:
          type: string
          description: The transcribed text
          example: 'Hello, world!'
    AudioTranscriptionRequest:
      required:
        - file
      type: object
      properties:
        diarize:
          type: boolean
          description: "Whether to enable speaker diarization. When enabled, you will get the speaker id for each word in the transcription. In the response, in the words array, you will get the speaker id for each word. In addition, we also return the speaker_segments array which contains the speaker id for each speaker segment along with the start and end time of the segment along with all the words in the segment. <br> <br> For eg - ... \"speaker_segments\": [\n  \"speaker_id\": \"SPEAKER_00\",\n  \"start\": 0,\n  \"end\": 30.02,\n  \"words\": [\n    {\n      \"id\": 0,\n      \"word\": \"Tijana\",\n      \"start\": 0,\n      \"end\": 11.475,\n      \"speaker_id\": \"SPEAKER_00\"\n    },\n    ...\n"
          default: false
        file:
          oneOf:
            - $ref: '#/components/schemas/AudioFileBinary'
            - $ref: '#/components/schemas/AudioFileUrl'
          description: 'Audio file upload or public HTTP/HTTPS URL. Supported formats .wav, .mp3, .m4a, .webm, .flac.'
        language:
          type: string
          description: 'Optional ISO 639-1 language code. If `auto` is provided, language is auto-detected.'
          default: en
          example: en
        max_speakers:
          type: integer
          description: Maximum number of speakers expected in the audio. Used to improve diarization accuracy when the approximate number of speakers is known.
        min_speakers:
          type: integer
          description: Minimum number of speakers expected in the audio. Used to improve diarization accuracy when the approximate number of speakers is known.
        model:
          enum:
            - openai/whisper-large-v3
          type: string
          description: Model to use for transcription
          default: openai/whisper-large-v3
        prompt:
          type: string
          description: Optional text to bias decoding.
        response_format:
          enum:
            - json
            - verbose_json
          type: string
          description: The format of the response
          default: json
        temperature:
          maximum: 1.0
          minimum: 0.0
          type: number
          description: Sampling temperature between 0.0 and 1.0
          format: float
          default: 0
        timestamp_granularities:
          oneOf:
            - enum:
                - segment
                - word
              type: string
            - maxItems: 2
              minItems: 1
              uniqueItems: true
              type: array
              items:
                enum:
                  - segment
                  - word
                type: string
          description: Controls level of timestamp detail in verbose_json. Only used when response_format is verbose_json. Can be a single granularity or an array to get multiple levels.
          default: segment
          example: word
    AudioTranscriptionResponse:
      oneOf:
        - $ref: '#/components/schemas/AudioTranscriptionJsonResponse'
        - $ref: '#/components/schemas/AudioTranscriptionVerboseJsonResponse'
    AudioTranscriptionSegment:
      required:
        - id
        - start
        - end
        - text
      type: object
      properties:
        end:
          type: number
          description: End time of the segment in seconds
          format: float
          example: 3.5
        id:
          type: integer
          description: Unique identifier for the segment
          example: 0
        start:
          type: number
          description: Start time of the segment in seconds
          format: float
          example: 0
        text:
          type: string
          description: The text content of the segment
          example: 'Hello, world!'
    AudioTranscriptionSpeakerSegment:
      required:
        - speaker_id
        - start
        - end
        - words
        - text
        - id
      type: object
      properties:
        end:
          type: number
          description: End time of the speaker segment in seconds
          format: float
          example: 30.02
        id:
          type: integer
          description: Unique identifier for the speaker segment
          example: 1
        speaker_id:
          type: string
          description: The speaker identifier
          example: SPEAKER_00
        start:
          type: number
          description: Start time of the speaker segment in seconds
          format: float
          example: 0
        text:
          type: string
          description: The full text spoken by this speaker in this segment
          example: 'Hello, how are you doing today?'
        words:
          type: array
          items:
            $ref: '#/components/schemas/AudioTranscriptionWord'
          description: Array of words spoken by this speaker in this segment
    AudioTranscriptionVerboseJsonResponse:
      required:
        - task
        - language
        - duration
        - text
        - segments
      type: object
      properties:
        duration:
          type: number
          description: The duration of the audio in seconds
          format: float
          example: 3.5
        language:
          type: string
          description: The language of the audio
          example: english
        segments:
          type: array
          items:
            $ref: '#/components/schemas/AudioTranscriptionSegment'
          description: Array of transcription segments
        speaker_segments:
          type: array
          items:
            $ref: '#/components/schemas/AudioTranscriptionSpeakerSegment'
          description: Array of transcription speaker segments (only when diarize is enabled)
        task:
          enum:
            - transcribe
            - translate
          type: string
          description: The task performed
          example: transcribe
        text:
          type: string
          description: The transcribed text
          example: 'Hello, world!'
        words:
          type: array
          items:
            $ref: '#/components/schemas/AudioTranscriptionWord'
          description: Array of transcription words (only when timestamp_granularities includes 'word')
    AudioTranscriptionWord:
      required:
        - word
        - start
        - end
      type: object
      properties:
        end:
          type: number
          description: End time of the word in seconds
          format: float
          example: 0.5
        speaker_id:
          type: string
          description: The speaker id for the word (only when diarize is enabled)
          example: SPEAKER_00
        start:
          type: number
          description: Start time of the word in seconds
          format: float
          example: 0
        word:
          type: string
          description: The word
          example: Hello
    AudioTranslationJsonResponse:
      required:
        - text
      type: object
      properties:
        text:
          type: string
          description: The translated text
          example: 'Hello, world!'
    AudioTranslationRequest:
      required:
        - file
      type: object
      properties:
        file:
          oneOf:
            - type: string
              description: Audio file to translate
              format: binary
            - type: string
              description: Public HTTP/HTTPS URL to audio file
              format: uri
          description: 'Audio file upload or public HTTP/HTTPS URL. Supported formats .wav, .mp3, .m4a, .webm, .flac.'
        language:
          type: string
          description: 'Target output language. Optional ISO 639-1 language code. If omitted, language is set to English.'
          default: en
          example: en
        model:
          enum:
            - openai/whisper-large-v3
          type: string
          description: Model to use for translation
          default: openai/whisper-large-v3
        prompt:
          type: string
          description: Optional text to bias decoding.
        response_format:
          enum:
            - json
            - verbose_json
          type: string
          description: The format of the response
          default: json
        temperature:
          maximum: 1.0
          minimum: 0.0
          type: number
          description: Sampling temperature between 0.0 and 1.0
          format: float
          default: 0
        timestamp_granularities:
          oneOf:
            - enum:
                - segment
                - word
              type: string
            - maxItems: 2
              minItems: 1
              uniqueItems: true
              type: array
              items:
                enum:
                  - segment
                  - word
                type: string
          description: Controls level of timestamp detail in verbose_json. Only used when response_format is verbose_json. Can be a single granularity or an array to get multiple levels.
          default: segment
          example: word
    AudioTranslationResponse:
      oneOf:
        - $ref: '#/components/schemas/AudioTranslationJsonResponse'
        - $ref: '#/components/schemas/AudioTranslationVerboseJsonResponse'
    AudioTranslationVerboseJsonResponse:
      required:
        - task
        - language
        - duration
        - text
        - segments
      type: object
      properties:
        duration:
          type: number
          description: The duration of the audio in seconds
          format: float
          example: 3.5
        language:
          type: string
          description: The target language of the translation
          example: english
        segments:
          type: array
          items:
            $ref: '#/components/schemas/AudioTranscriptionSegment'
          description: Array of translation segments
        task:
          enum:
            - transcribe
            - translate
          type: string
          description: The task performed
          example: translate
        text:
          type: string
          description: The translated text
          example: 'Hello, world!'
        words:
          type: array
          items:
            $ref: '#/components/schemas/AudioTranscriptionWord'
          description: Array of translation words (only when timestamp_granularities includes 'word')
    Autoscaling:
      required:
        - min_replicas
        - max_replicas
      type: object
      properties:
        max_replicas:
          type: integer
          description: The maximum number of replicas to scale up to under load
          format: int32
          example: 5
        min_replicas:
          type: integer
          description: 'The minimum number of replicas to maintain, even when there is no load'
          format: int32
          example: 2
      description: Configuration for automatic scaling of replicas based on demand.
    BatchErrorResponse:
      type: object
      properties:
        error:
          type: string
    BatchJob:
      type: object
      properties:
        completed_at:
          type: string
          format: date-time
          example: '2024-01-15T15:45:30.0000000+00:00'
        created_at:
          type: string
          format: date-time
          example: '2024-01-15T14:30:00.0000000+00:00'
        endpoint:
          type: string
          example: /v1/chat/completions
        error:
          type: string
        error_file_id:
          type: string
          example: file-errors456def789jkl
        file_size_bytes:
          type: integer
          description: Size of input file in bytes
          format: int64
          example: 1048576
        id:
          type: string
          format: uuid
          example: 01234567-8901-2345-6789-012345678901
        input_file_id:
          type: string
          example: file-input123abc456def
        job_deadline:
          type: string
          format: date-time
          example: '2024-01-15T15:30:00.0000000+00:00'
        model_id:
          type: string
          description: Model used for processing requests
          example: meta-llama/Meta-Llama-3.1-8B-Instruct-Turbo
        output_file_id:
          type: string
          example: file-output789xyz012ghi
        progress:
          type: number
          description: Completion progress (0.0 to 100)
          format: float64
          example: 75
        status:
          $ref: '#/components/schemas/BatchJobStatus'
        user_id:
          type: string
          example: user_789xyz012
    BatchJobStatus:
      enum:
        - VALIDATING
        - IN_PROGRESS
        - COMPLETED
        - FAILED
        - EXPIRED
        - CANCELLED
      type: string
      description: Current status of the batch job
      example: IN_PROGRESS
    BatchJobWithWarning:
      type: object
      properties:
        job:
          $ref: '#/components/schemas/BatchJob'
        warning:
          type: string
    ChatCompletionAssistantMessageParam:
      required:
        - role
      type: object
      properties:
        content:
          type:
            - 'null'
            - string
        function_call:
          required:
            - arguments
            - name
          type: object
          properties:
            arguments:
              type: string
            name:
              type: string
          deprecated: true
        name:
          type: string
        role:
          enum:
            - assistant
          type: string
        tool_calls:
          type: array
          items:
            $ref: '#/components/schemas/ToolChoice'
    ChatCompletionChoice:
      required:
        - index
        - delta
        - finish_reason
      type: object
      properties:
        delta:
          title: ChatCompletionChoiceDelta
          required:
            - role
          type: object
          properties:
            content:
              type:
                - 'null'
                - string
            function_call:
              required:
                - arguments
                - name
              type:
                - 'null'
                - object
              properties:
                arguments:
                  type: string
                name:
                  type: string
              deprecated: true
            reasoning:
              type:
                - 'null'
                - string
            role:
              enum:
                - system
                - user
                - assistant
                - function
                - tool
              type: string
            token_id:
              type: integer
            tool_calls:
              type: array
              items:
                $ref: '#/components/schemas/ToolChoice'
        finish_reason:
          $ref: '#/components/schemas/FinishReason'
        index:
          type: integer
        logprobs:
          $ref: '#/components/schemas/LogprobsPart'
    ChatCompletionChoicesData:
      type: array
      items:
        type: object
        properties:
          finish_reason:
            $ref: '#/components/schemas/FinishReason'
          index:
            type: integer
          logprobs:
            $ref: '#/components/schemas/LogprobsPart'
          message:
            $ref: '#/components/schemas/ChatCompletionMessage'
          seed:
            type: integer
          text:
            type: string
          top_logprobs:
            $ref: '#/components/schemas/TopLogprobs'
    ChatCompletionChunk:
      required:
        - id
        - object
        - created
        - choices
        - model
      type: object
      properties:
        choices:
          title: ChatCompletionChoices
          type: array
          items:
            required:
              - index
              - delta
              - finish_reason
            type: object
            properties:
              delta:
                title: ChatCompletionChoiceDelta
                required:
                  - role
                type: object
                properties:
                  content:
                    type:
                      - 'null'
                      - string
                  function_call:
                    required:
                      - arguments
                      - name
                    type:
                      - 'null'
                      - object
                    properties:
                      arguments:
                        type: string
                      name:
                        type: string
                    deprecated: true
                  reasoning:
                    type:
                      - 'null'
                      - string
                  role:
                    enum:
                      - system
                      - user
                      - assistant
                      - function
                      - tool
                    type: string
                  token_id:
                    type: integer
                  tool_calls:
                    type: array
                    items:
                      $ref: '#/components/schemas/ToolChoice'
              finish_reason:
                $ref: '#/components/schemas/FinishReason'
              index:
                type: integer
              logprobs:
                type:
                  - 'null'
                  - number
              seed:
                type:
                  - 'null'
                  - integer
              top_logprobs:
                $ref: '#/components/schemas/TopLogprobs'
        created:
          type: integer
        id:
          type: string
        model:
          type: string
          example: mistralai/Mixtral-8x7B-Instruct-v0.1
        object:
          enum:
            - chat.completion.chunk
          description: 'The object type, which is always `chat.completion.chunk`.'
        system_fingerprint:
          type: string
        usage:
          $ref: '#/components/schemas/UsageData'
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/InferenceWarning'
    ChatCompletionEvent:
      required:
        - data
      type: object
      properties:
        data:
          $ref: '#/components/schemas/ChatCompletionChunk'
    ChatCompletionFunctionMessageParam:
      required:
        - content
        - role
        - name
      type: object
      properties:
        content:
          type: string
        name:
          type: string
        role:
          enum:
            - function
          type: string
      deprecated: true
    ChatCompletionMessage:
      required:
        - role
        - content
      type: object
      properties:
        content:
          type:
            - 'null'
            - string
        function_call:
          required:
            - arguments
            - name
          type: object
          properties:
            arguments:
              type: string
            name:
              type: string
          deprecated: true
        reasoning:
          type:
            - 'null'
            - string
        role:
          enum:
            - assistant
          type: string
        tool_calls:
          type: array
          items:
            $ref: '#/components/schemas/ToolChoice'
    ChatCompletionMessageParam:
      oneOf:
        - $ref: '#/components/schemas/ChatCompletionSystemMessageParam'
        - $ref: '#/components/schemas/ChatCompletionUserMessageParam'
        - $ref: '#/components/schemas/ChatCompletionAssistantMessageParam'
        - $ref: '#/components/schemas/ChatCompletionToolMessageParam'
        - $ref: '#/components/schemas/ChatCompletionFunctionMessageParam'
    ChatCompletionRequest:
      required:
        - model
        - messages
      type: object
      properties:
        chat_template_kwargs:
          type: object
          description: Additional configuration to pass to model engine.
        compliance:
          enum:
            - hipaa
        context_length_exceeded_behavior:
          enum:
            - truncate
            - error
          type: string
          description: 'Defined the behavior of the API when max_tokens exceed the maximum context length of the model. When set to ''error'', API will return 400 with appropriate error message. When set to ''truncate'', override the max_tokens with maximum context length of the model.'
          default: error
        echo:
          type: boolean
          description: 'If true, the response will contain the prompt. Can be used with `logprobs` to return prompt logprobs.'
        frequency_penalty:
          type: number
          description: A number between -2.0 and 2.0 where a positive value decreases the likelihood of repeating tokens that have already been mentioned.
          format: float
        function_call:
          oneOf:
            - enum:
                - none
                - auto
              type: string
            - required:
                - name
              type: object
              properties:
                name:
                  type: string
        logit_bias:
          type: object
          additionalProperties:
            type: number
            format: float
          description: Adjusts the likelihood of specific tokens appearing in the generated output.
          example:
            '1024': -10.5
            '105': 21.4
        logprobs:
          maximum: 20
          minimum: 0
          type: integer
          description: 'An integer between 0 and 20 of the top k tokens to return log probabilities for at each generation step, instead of just the sampled token. Log probabilities help assess model confidence in token predictions.'
        max_tokens:
          type: integer
          description: The maximum number of tokens to generate.
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatCompletionMessageParam'
          description: A list of messages comprising the conversation so far.
        min_p:
          type: number
          description: A number between 0 and 1 that can be used as an alternative to top_p and top-k.
          format: float
        model:
          anyOf:
            - enum:
                - Qwen/Qwen2.5-72B-Instruct-Turbo
                - Qwen/Qwen2.5-7B-Instruct-Turbo
                - meta-llama/Meta-Llama-3.1-405B-Instruct-Turbo
                - meta-llama/Meta-Llama-3.1-70B-Instruct-Turbo
                - meta-llama/Meta-Llama-3.1-8B-Instruct-Turbo
              type: string
            - type: string
          description: "The name of the model to query.<br> <br> [See all of Together AI's chat models](https://docs.together.ai/docs/serverless-models#chat-models)\n"
          example: meta-llama/Meta-Llama-3.1-8B-Instruct-Turbo
        n:
          maximum: 128
          minimum: 1
          type: integer
          description: The number of completions to generate for each prompt.
        presence_penalty:
          type: number
          description: A number between -2.0 and 2.0 where a positive value increases the likelihood of a model talking about new topics.
          format: float
        reasoning:
          type: object
          properties:
            enabled:
              type: boolean
          description: 'For models that support toggling reasoning functionality, this object can be used to control that functionality.'
        reasoning_effort:
          enum:
            - low
            - medium
            - high
          type: string
          description: Controls the level of reasoning effort the model should apply when generating responses. Higher values may result in more thoughtful and detailed responses but may take longer to generate.
          example: medium
        repetition_penalty:
          type: number
          description: A number that controls the diversity of generated text by reducing the likelihood of repeated sequences. Higher values decrease repetition.
        response_format:
          anyOf:
            - $ref: '#/components/schemas/ResponseFormatText'
            - $ref: '#/components/schemas/ResponseFormatJsonSchema'
            - $ref: '#/components/schemas/ResponseFormatJsonObject'
          description: "An object specifying the format that the model must output.\n\nSetting to `{ \"type\": \"json_schema\", \"json_schema\": {...} }` enables\nStructured Outputs which ensures the model will match your supplied JSON\nschema. Learn more in the [Structured Outputs\nguide](https://docs.together.ai/docs/json-mode).\n\nSetting to `{ \"type\": \"json_object\" }` enables the older JSON mode, which\nensures the message the model generates is valid JSON. Using `json_schema`\nis preferred for models that support it.\n"
          discriminator:
            propertyName: type
        safety_model:
          type: string
          description: 'The name of the moderation model used to validate tokens. Choose from the available moderation models found [here](https://docs.together.ai/docs/inference-models#moderation-models).'
          example: safety_model_name
        seed:
          type: integer
          description: Seed value for reproducibility.
          example: 42
        stop:
          type: array
          items:
            type: string
          description: 'A list of string sequences that will truncate (stop) inference text output. For example, "</s>" will stop generation as soon as the model generates the given token.'
        stream:
          type: boolean
          description: 'If true, stream tokens as Server-Sent Events as the model generates them instead of waiting for the full model response. The stream terminates with `data: [DONE]`. If false, return a single JSON object containing the results.'
        temperature:
          type: number
          description: A decimal number from 0-1 that determines the degree of randomness in the response. A temperature less than 1 favors more correctness and is appropriate for question answering or summarization. A value closer to 1 introduces more randomness in the output.
          format: float
        tool_choice:
          oneOf:
            - type: string
              example: tool_name
            - $ref: '#/components/schemas/ToolChoice'
          description: 'Controls which (if any) function is called by the model. By default uses `auto`, which lets the model pick between generating a message or calling a function.'
        tools:
          type: array
          items:
            $ref: '#/components/schemas/ToolsPart'
          description: 'A list of tools the model may call. Currently, only functions are supported as a tool. Use this to provide a list of functions the model may generate JSON inputs for.'
        top_k:
          type: integer
          description: 'An integer that''s used to limit the number of choices for the next predicted word or token. It specifies the maximum number of tokens to consider at each step, based on their probability of occurrence. This technique helps to speed up the generation process and can improve the quality of the generated text by focusing on the most likely options.'
          format: int32
        top_p:
          type: number
          description: A percentage (also called the nucleus parameter) that's used to dynamically adjust the number of choices for each predicted token based on the cumulative probabilities. It specifies a probability threshold below which all less likely tokens are filtered out. This technique helps maintain diversity and generate more fluent and natural-sounding text.
          format: float
