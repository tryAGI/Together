  '/deployments/storage/{filename}':
    get:
      tags:
        - DeploymentsStorage
      summary: Download a file
      description: Download a file by redirecting to a signed URL
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
            description: Filename
      responses:
        '307':
          description: Redirect to signed download URL
          content:
            application/json:
              schema:
                type: string
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
        '404':
          description: File not found
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
