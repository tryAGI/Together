          source: "import Together from \"together-ai\";\nconst client = new Together();\n\nconst secrets = await client.beta.jig.secrets.list();\nconsole.log(secrets);\n"
    post:
      tags:
        - Secrets
      summary: Create a new secret
      description: Create a new secret to store sensitive configuration values
      requestBody:
        description: Secret configuration
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSecretRequest'
        required: true
      responses:
        '200':
          description: Secret created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecretResponseItem'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                type: object
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
      x-codeSamples:
        - lang: Python
          label: Together AI SDK (v2)
          source: "from together import Together\nclient = Together()\n\nclient.beta.jig.secrets.create(name=\"my-secret\", value=\"my-value\")\n"
        - lang: TypeScript
          label: Together AI SDK (TypeScript)
          source: "import Together from \"together-ai\";\nconst client = new Together();\n\nawait client.beta.jig.secrets.create({ name: \"my-secret\", value: \"my-value\" });\n"
        - lang: JavaScript
          label: Together AI SDK (JavaScript)
          source: "import Together from \"together-ai\";\nconst client = new Together();\n\nawait client.beta.jig.secrets.create({ name: \"my-secret\", value: \"my-value\" });\n"
        - lang: Shell
          label: cURL
          source: "curl -X POST \\\n      -H \"Authorization: Bearer $TOGETHER_API_KEY\" \\\n      --data '{ \"name\": \"my-secret\", \"value\": \"my-value\" }' \\\n      https://api.together.ai/v1/deployments/secrets\n"
