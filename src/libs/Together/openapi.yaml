          content:
            application/json:
              schema:
                type: object
        '404':
          description: Secret not found
          content:
            application/json:
              schema:
                type: object
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
      x-codeSamples:
        - lang: Python
          label: Together AI SDK (v2)
          source: "from together import Together\nclient = Together()\n\nclient.beta.jig.secrets.update(\"my-secret\", value=\"my-new-value\")\n"
        - lang: TypeScript
