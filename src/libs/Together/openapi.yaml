      type: object
      properties:
        model:
          type: string
          description: Model identifier the job was submitted to
        request_id:
          type: string
          description: The request ID returned from the submit endpoint
    QueueCancelResponse:
      required:
        - status
      type: object
      properties:
        status:
          enum:
            - canceled
            - running
            - done
            - failed
          type: string
          description: "Job status after the cancel attempt. Only pending jobs can be\ncanceled. If the job is already running, done, or failed, the status\nis returned unchanged.\n"
    QueueError:
      type: object
      properties:
        code:
          type: string
          description: Machine-readable error code
        message:
          type: string
          description: Human-readable error message
        param:
          type: string
          description: 'The parameter that caused the error, if applicable'
        type:
          type: string
          description: 'Error category (e.g. "invalid_request_error", "not_found_error")'
    QueueJobRequest:
      required:
        - model
        - payload
      type: object
      properties:
        info:
          type: object
          description: "Arbitrary JSON metadata stored with the job and returned in status\nresponses. The model and system may add or update keys during\nprocessing.\n"
        model:
          type: string
          description: Required model identifier
        payload:
          type: object
          description: Freeform model input. Passed unchanged to the model. Contents are model-specific.
        priority:
          type: integer
          description: "Job priority. Higher values are processed first (strict priority\nordering). Jobs with equal priority are processed in submission\norder (FIFO).\n"
          default: 0
    QueueJobResponse:
      type: object
      properties:
        error:
          $ref: '#/components/schemas/QueueError'
        requestId:
          type: string
          description: Unique identifier for the submitted job. Use this to poll status or cancel.
    QueueJobStatusResponse:
      required:
        - request_id
        - model
        - status
      type: object
      properties:
        claimed_at:
          type: string
          description: Timestamp when a worker claimed the job
          format: date-time
        created_at:
          type: string
          description: Timestamp when the job was created
          format: date-time
        done_at:
          type: string
          description: Timestamp when the job completed (done or failed)
          format: date-time
        info:
          type: object
          description: "Job metadata. Contains keys from the submit request, plus any\nmodifications from the model or system (e.g. progress, retry\nhistory).\n"
        inputs:
          type: object
          description: 'Freeform model input, as submitted'
        model:
          type: string
          description: Model identifier the job was submitted to
        outputs:
          type: object
          description: 'Freeform model output, populated when the job reaches done status. Contents are model-specific.'
        priority:
          type: integer
          description: Job priority. Higher values are processed first.
        request_id:
          type: string
          description: The request ID that was returned from the submit endpoint
        retries:
          type: integer
          description: "Number of times this job has been retried. Workers set a claim\ntimeout and must send periodic status updates to keep the job alive.\nIf no update is received within the timeout, the job is returned to\nthe queue and retried. After 3 retries the job is permanently\nfailed. Jobs explicitly failed by the model are not retried.\n"
        status:
          enum:
            - pending
            - running
            - done
            - failed
            - canceled
          type: string
          description: "Current job status. Transitions: pending → running → done/failed. A pending job may also be canceled.\n"
        warnings:
          type: array
          items:
            type: string
          description: Non-fatal messages about the request (e.g. deprecation notices)
    QueueMetricsResponse:
      required:
