openapi: '3.2.0'
info:
  title: Together APIs
  description: The Together REST API. Please see https://docs.together.ai for more details.
  termsOfService: https://www.together.ai/terms-of-service
  contact:
    name: Together Support
    url: https://www.together.ai/contact
  license:
    name: MIT
    url: https://github.com/togethercomputer/openapi/blob/main/LICENSE
  version: 2.0.0
servers:
  - url: https://api.together.xyz/v1
paths:
  /deployments:
    get:
      tags:
        - Deployments
      summary: Get the list of deployments
      description: Get a list of all deployments in your project
      responses:
        '200':
          description: List of deployments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentListResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
      x-codeSamples:
        - lang: Python
          label: Together AI SDK (v2)
          source: "from together import Together\nclient = Together()\n\ndeployments = client.beta.jig.list()\nprint(deployments)\n"
        - lang: TypeScript
          label: Together AI SDK (TypeScript)
          source: "import Together from \"together-ai\";\nconst client = new Together();\n\nconst deployments = await client.beta.jig.list();\nconsole.log(deployments);\n"
        - lang: JavaScript
          label: Together AI SDK (JavaScript)
          source: "import Together from \"together-ai\";\nconst client = new Together();\n\nconst deployments = await client.beta.jig.list();\nconsole.log(deployments);\n"
        - lang: Shell
          label: cURL
          source: "curl -X GET \\\n      -H \"Authorization: Bearer $TOGETHER_API_KEY\" \\\n      https://api.together.ai/v1/deployments\n"
    post:
      tags:
        - Deployments
      summary: Create a new deployment
      description: Create a new deployment with specified configuration
      requestBody:
        description: Deployment configuration
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeploymentRequest'
        required: true
      responses:
        '200':
          description: Deployment created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentResponseItem'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                type: object
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
      x-codeSamples:
        - lang: Python
          label: Together AI SDK (v2)
          source: "from together import Together\nclient = Together()\n\ndeployment = client.beta.jig.deploy(\n  name=\"my-deployment\",\n  gpu_type=\"h100-80gb\",\n  image=\"registry.together.xyz/proj_abcdefg1234567890/my-image:latest\"\n)\nprint(deployment)\n"
        - lang: TypeScript
          label: Together AI SDK (TypeScript)
          source: "import Together from \"together-ai\";\nconst client = new Together();\n\nconst deployment = await client.beta.jig.deploy({\n  name: \"my-deployment\",\n  gpu_type: \"h100-80gb\",\n  image: \"registry.together.xyz/proj_abcdefg1234567890/my-image:latest\"\n});\nconsole.log(deployment);\n"
        - lang: JavaScript
          label: Together AI SDK (JavaScript)
          source: "import Together from \"together-ai\";\nconst client = new Together();\n\nconst deployment = await client.beta.jig.deploy({\n  name: \"my-deployment\",\n  gpu_type: \"h100-80gb\",\n  image: \"registry.together.xyz/proj_abcdefg1234567890/my-image:latest\"\n});\nconsole.log(deployment);\n"
  '/deployments/{id}':
    delete:
      tags:
        - Deployments
      summary: Delete a deployment
      description: Delete an existing deployment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            description: Deployment ID or name
      responses:
        '200':
          description: Deployment deleted successfully
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Deployment not found
          content:
            application/json:
              schema:
                type: object
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
      x-codeSamples:
        - lang: Python
          label: Together AI SDK (v2)
          source: "from together import Together\nclient = Together()\n\ndeployment = client.beta.jig.destroy(\"my-deployment\")\nprint(deployment)\n"
        - lang: TypeScript
          label: Together AI SDK (TypeScript)
          source: "import Together from \"together-ai\";\nconst client = new Together();\n\nconst deployment = await client.beta.jig.destroy(\"my-deployment\");\nconsole.log(deployment);\n"
        - lang: JavaScript
          label: Together AI SDK (JavaScript)
          source: "import Together from \"together-ai\";\nconst client = new Together();\n\nconst deployment = await client.beta.jig.destroy(\"my-deployment\");\nconsole.log(deployment);\n"
        - lang: Shell
          label: cURL
          source: "curl -X DELETE \\\n      -H \"Authorization: Bearer $TOGETHER_API_KEY\" \\\n      https://api.together.ai/v1/deployments/my-deployment\n"
    get:
      tags:
        - Deployments
      summary: Get a deployment by ID or name
      description: Retrieve details of a specific deployment by its ID or name
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            description: Deployment ID or name
      responses:
        '200':
          description: Deployment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentResponseItem'
        '404':
          description: Deployment not found
          content:
            application/json:
              schema:
                type: object
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
      x-codeSamples:
        - lang: Python
          label: Together AI SDK (v2)
          source: "from together import Together\nclient = Together()\n\ndeployment = client.beta.jig.retrieve(\"my-deployment\")\nprint(deployment)\n"
        - lang: TypeScript
          label: Together AI SDK (TypeScript)
          source: "import Together from \"together-ai\";\nconst client = new Together();\n\nconst deployment = await client.beta.jig.retrieve(\"my-deployment\");\nconsole.log(deployment);\n"
        - lang: JavaScript
          label: Together AI SDK (JavaScript)
          source: "import Together from \"together-ai\";\nconst client = new Together();\n\nconst deployment = await client.beta.jig.retrieve(\"my-deployment\");\nconsole.log(deployment);\n"
    patch:
      tags:
        - Deployments
      summary: Update a deployment
      description: Update an existing deployment configuration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            description: Deployment ID or name
      requestBody:
        description: Updated deployment configuration
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDeploymentRequest'
        required: true
      responses:
        '200':
          description: Deployment updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentResponseItem'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Deployment not found
          content:
            application/json:
              schema:
                type: object
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
      x-codeSamples:
        - lang: Python
          label: Together AI SDK (v2)
          source: "from together import Together\nclient = Together()\n\ndeployment = client.beta.jig.update(\"my-deployment\", gpu_count=2)\nprint(deployment)\n"
        - lang: TypeScript
          label: Together AI SDK (TypeScript)
          source: "import Together from \"together-ai\";\nconst client = new Together();\n\nconst deployment = await client.beta.jig.update(\"my-deployment\", { gpu_count: 2 });\nconsole.log(deployment);\n"
        - lang: JavaScript
          label: Together AI SDK (JavaScript)
          source: "import Together from \"together-ai\";\nconst client = new Together();\n\nconst deployment = await client.beta.jig.update(\"my-deployment\", { gpu_count: 2 });\nconsole.log(deployment);\n"
        - lang: Shell
          label: cURL
          source: "curl -X PATCH \\\n      -H \"Authorization: Bearer $TOGETHER_API_KEY\" \\\n      --data '{ \"gpu_count\": 2 }' \\\n      https://api.together.ai/v1/deployments/my-deployment\n"
  '/deployments/{id}/logs':
    get:
      tags:
        - Deployments
      summary: Get logs for a deployment
      description: 'Retrieve logs from a deployment, optionally filtered by replica ID.'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            description: Deployment ID or name
        - name: replica_id
          in: query
          schema:
            type: string
            description: Replica ID to filter logs
      responses:
        '200':
          description: Deployment logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentLogs'
        '404':
          description: Deployment not found
          content:
            application/json:
              schema:
                type: object
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
      x-codeSamples:
        - lang: Python
          label: Together AI SDK (v2)
          source: "from together import Together\nclient = Together()\n\ndeployment = client.beta.jig.logs(\"my-deployment\")\nprint(deployment)\n"
        - lang: TypeScript
          label: Together AI SDK (TypeScript)
          source: "import Together from \"together-ai\";\nconst client = new Together();\n\nconst deployment = await client.beta.jig.logs(\"my-deployment\");\nconsole.log(deployment);\n"
        - lang: JavaScript
          label: Together AI SDK (JavaScript)
          source: "import Together from \"together-ai\";\nconst client = new Together();\n\nconst deployment = await client.beta.jig.logs(\"my-deployment\");\nconsole.log(deployment);\n"
        - lang: Shell
          label: cURL
          source: "curl -X GET \\\n      -H \"Authorization: Bearer $TOGETHER_API_KEY\" \\\n      https://api.together.ai/v1/deployments/my-deployment/logs\n"
  /deployments/secrets:
    get:
